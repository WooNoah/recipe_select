<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今天吃什么</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-panel">
        <p class="eyebrow">Daily Recipe Menu</p>
        <h1>今天吃什么</h1>
        <p class="intro">
          从你的菜单分类里随机抽取今日菜单。经典肉类和汤品会按主食材权重搭配，后续新增分类后页面也会自动展示。
        </p>

        <div class="toolbar">
          <button class="draw-button" type="button" data-role="draw-button" disabled>
            正在读取菜谱...
          </button>
          <p class="status-line" data-role="status"></p>
        </div>

        <p class="error-box" data-role="error" hidden></p>
      </section>

      <section class="result-panel" data-role="result-section" hidden>
        <div class="result-heading">
          <p class="eyebrow">Today’s Draw</p>
          <h2>今日菜单</h2>
        </div>

        <div class="dish-grid" data-role="dish-grid"></div>
        <template data-role="dish-template">
          <article class="dish-card">
            <p class="dish-category" data-role="dish-category"></p>
            <h3 class="dish-name" data-role="dish-name"></h3>
          </article>
        </template>
      </section>
    </main>

  </body>
</html>
